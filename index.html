<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Conteo - CIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYOShmp1M2Mo-Vc1aN8F-VU0Bw4BXOdLA",
            authDomain: "cic-10-1.firebaseapp.com",
            projectId: "cic-10-1",
            storageBucket: "cic-10-1.firebasestorage.app",
            messagingSenderId: "697412113110",
            appId: "1:697412113110:web:51f5708ed523992d9daf77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const casetas = ["Simón Bolivar", "Carranza", "Edison", "Impulso", "Michelena", "Recepción", "Video Portero U.N."];
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        let selectedCaseta = localStorage.getItem('cic_capture_caseta') || "";
        let configCajones = {};
        let todayData = {};

        const getDayKey = (date) => `${String(date.getDate()).padStart(2, '0')}${String(date.getMonth() + 1).padStart(2, '0')}${date.getFullYear()}`;

        async function init() {
            onSnapshot(doc(db, "CIC", "ConteoIngresos"), (snap) => {
                if (snap.exists()) configCajones = snap.data().configCajones || {};
                renderStats();
            });

            const now = new Date();
            const yearStr = now.getFullYear().toString();
            const monthStr = monthNames[now.getMonth()];
            const dayKey = getDayKey(now);

            onSnapshot(doc(db, "CIC/ConteoIngresos", yearStr, monthStr), (snap) => {
                const fullData = snap.exists() ? snap.data() : {};
                todayData = fullData[dayKey] || {};
                renderStats();
            });
        }

        window.setCaseta = (c) => {
            selectedCaseta = c;
            localStorage.setItem('cic_capture_caseta', c);
            renderStats();
        };

        window.changeCaseta = () => {
            selectedCaseta = "";
            localStorage.removeItem('cic_capture_caseta');
            renderStats();
        };

        async function registrar(path, value = 1) {
            if (!selectedCaseta) return;
            const now = new Date();
            const yearStr = now.getFullYear().toString();
            const monthStr = monthNames[now.getMonth()];
            const dayKey = getDayKey(now);

            const docRef = doc(db, "CIC/ConteoIngresos", yearStr, monthStr);
            
            // Lógica para manejar rutas anidadas (como externos.visita o lotes.principal)
            const parts = path.split('.');
            let updateObj = {};
            
            if (parts.length === 2) {
                updateObj = {
                    [dayKey]: {
                        [selectedCaseta]: {
                            [parts[0]]: {
                                [parts[1]]: increment(value)
                            }
                        }
                    }
                };
            } else {
                updateObj = {
                    [dayKey]: {
                        [selectedCaseta]: {
                            [path]: increment(value)
                        }
                    }
                };
            }

            try {
                await setDoc(docRef, updateObj, { merge: true });
            } catch (e) { console.error("Error al registrar:", e); }
        }

        window.registrarPersona = (tipo) => {
            if (tipo === 'interno') registrar('personas');
            else registrar(`externos.${tipo}`);
        };

        window.registrarVehiculo = (lote, capActual, capMax) => {
            if (capMax > 0 && capActual >= capMax) {
                // Notificación visual de saturación
                const btn = document.getElementById(`btn-v-${lote}`);
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 500);
            }
            registrar(`lotes.${lote}`);
            // Sumar al total general de vehículos de la caseta para el dashboard
            registrar('vehiculos');
        };

        function renderStats() {
            const view = document.getElementById('capture-view');
            const selector = document.getElementById('caseta-selector');
            
            if (!selectedCaseta) {
                view.classList.add('hidden');
                selector.classList.remove('hidden');
                return;
            }

            selector.classList.add('hidden');
            view.classList.remove('hidden');

            const data = todayData[selectedCaseta] || {};
            const ext = data.externos || {};
            const lotesData = data.lotes || {};
            const lotsConfig = configCajones[selectedCaseta] || {};

            // Totales para encabezado
            const totalP = (data.personas || 0) + (ext.prestador || 0) + (ext.visita || 0) + (ext.consultor || 0);
            const totalV = data.vehiculos || 0;

            document.getElementById('display-caseta').innerText = selectedCaseta;
            document.getElementById('head-total-p').innerText = totalP;
            document.getElementById('head-total-v').innerText = totalV;

            // Render botones Personas con totales
            document.getElementById('btn-p-interno').innerHTML = `<span>Interno</span><span class="opacity-50">(${data.personas || 0})</span>`;
            document.getElementById('btn-p-prestador').innerHTML = `<span>Prestador de Servicio</span><span class="opacity-50">(${ext.prestador || 0})</span>`;
            document.getElementById('btn-p-visita').innerHTML = `<span>Visita</span><span class="opacity-50">(${ext.visita || 0})</span>`;
            document.getElementById('btn-p-consultor').innerHTML = `<span>Consultor</span><span class="opacity-50">(${ext.consultor || 0})</span>`;

            // Render botones Vehículos dinámicos
            const vContainer = document.getElementById('vehiculos-grid');
            const lotKeys = Object.keys(lotsConfig);
            
            if (lotKeys.length === 0) {
                vContainer.innerHTML = `<div class="col-span-full py-8 text-center opacity-20 italic text-[10px] font-black uppercase tracking-widest">Sin lotes configurados</div>`;
            } else {
                vContainer.innerHTML = lotKeys.map(lote => {
                    const ocupados = lotesData[lote] || 0;
                    const capacidad = lotsConfig[lote] || 0;
                    const disponibles = Math.max(0, capacidad - ocupados);
                    const isFull = capacidad > 0 && disponibles === 0;

                    return `
                        <button id="btn-v-${lote}" onclick="registrarVehiculo('${lote}', ${ocupados}, ${capacidad})" 
                            class="capture-btn flex flex-col items-center justify-center p-4 rounded-[2rem] border-2 transition-all active:scale-95 ${isFull ? 'bg-rose-600 border-rose-400 text-white shadow-rose-200' : 'bg-white border-slate-100 text-slate-700 shadow-sm'}">
                            <i class="fa-solid fa-car-side mb-2 text-xl ${isFull ? 'text-white' : 'text-emerald-500'}"></i>
                            <span class="text-[10px] font-black uppercase tracking-tighter leading-tight mb-1">${lote}</span>
                            <div class="flex flex-col leading-none">
                                <span class="text-[14px] font-black">${ocupados} / ${capacidad}</span>
                                <span class="text-[7px] font-bold uppercase ${isFull ? 'text-rose-200' : 'text-slate-400'} mt-1">Libres: ${disponibles}</span>
                            </div>
                        </button>
                    `;
                }).join('');
            }
        }

        window.onload = init;
    </script>
    <style>
        .capture-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .header-glass {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Selector de Caseta -->
    <div id="caseta-selector" class="flex-1 flex flex-col p-6 items-center justify-center text-white overflow-y-auto">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 shadow-2xl rotate-3">
                <i class="fa-solid fa-building-shield text-3xl"></i>
            </div>
            <h1 class="text-xl font-black uppercase tracking-[0.2em] mb-2">Puesto de Control</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Seleccione su estación</p>
            <div class="grid grid-cols-1 gap-3">
                <script>
                    document.write(["Simón Bolivar", "Carranza", "Edison", "Impulso", "Michelena", "Recepción", "Video Portero U.N."].map(c => `
                        <button onclick="setCaseta('${c}')" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">
                            ${c}
                        </button>
                    `).join(''));
                </script>
            </div>
        </div>
    </div>

    <!-- Interfaz de Captura Activa -->
    <div id="capture-view" class="hidden flex-1 flex flex-col bg-slate-50 rounded-t-[3.5rem] overflow-hidden relative shadow-2xl">
        
        <!-- Encabezado con Totales -->
        <header class="header-glass p-6 pt-10 flex flex-col gap-6 shrink-0 text-white">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10"><i class="fa-solid fa-location-dot text-indigo-400"></i></div>
                    <h2 id="display-caseta" class="text-lg font-black uppercase tracking-tighter">---</h2>
                </div>
                <button onclick="changeCaseta()" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white/70 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/5">Cambiar</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/30 p-3 rounded-2xl border border-white/5 flex items-center justify-between">
                    <div class="flex flex-col"><span class="text-[7px] font-black text-indigo-400 uppercase tracking-widest">Personas</span><span id="head-total-p" class="text-2xl font-black leading-none">0</span></div>
                    <i class="fa-solid fa-users text-white/10 text-2xl"></i>
                </div>
                <div class="bg-black/30 p-3 rounded-2xl border border-white/5 flex items-center justify-between">
                    <div class="flex flex-col"><span class="text-[7px] font-black text-emerald-400 uppercase tracking-widest">Vehículos</span><span id="head-total-v" class="text-2xl font-black leading-none">0</span></div>
                    <i class="fa-solid fa-car text-white/10 text-2xl"></i>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 space-y-8 custom-scroll pb-12">
            
            <!-- SECCIÓN 1: PERSONAS -->
            <section>
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-1.5 h-4 bg-indigo-600 rounded-full"></div>
                    <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Ingreso de Personas</h3>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <button id="btn-p-interno" onclick="registrarPersona('interno')" class="capture-btn w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-indigo-100 flex items-center justify-center gap-3">
                        <span>Interno</span> <span class="opacity-50">(0)</span>
                    </button>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <button id="btn-p-prestador" onclick="registrarPersona('prestador')" class="capture-btn py-4 bg-white border-2 border-indigo-100 text-indigo-600 rounded-2xl font-black text-[9px] uppercase tracking-widest flex flex-col items-center gap-1">
                            <span>Prestador</span> <span class="opacity-40 text-[8px]">(0)</span>
                        </button>
                        <button id="btn-p-visita" onclick="registrarPersona('visita')" class="capture-btn py-4 bg-white border-2 border-indigo-100 text-indigo-600 rounded-2xl font-black text-[9px] uppercase tracking-widest flex flex-col items-center gap-1">
                            <span>Visita</span> <span class="opacity-40 text-[8px]">(0)</span>
                        </button>
                        <button id="btn-p-consultor" onclick="registrarPersona('consultor')" class="capture-btn py-4 bg-white border-2 border-indigo-100 text-indigo-600 rounded-2xl font-black text-[9px] uppercase tracking-widest flex flex-col items-center gap-1">
                            <span>Consultor</span> <span class="opacity-40 text-[8px]">(0)</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN 2: VEHÍCULOS -->
            <section>
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-1.5 h-4 bg-emerald-500 rounded-full"></div>
                    <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Acceso de Vehículos</h3>
                </div>
                <div id="vehiculos-grid" class="grid grid-cols-2 gap-4">
                    <!-- Los lotes se inyectan dinámicamente -->
                </div>
            </section>

        </main>
    </div>

</body>
</html>
