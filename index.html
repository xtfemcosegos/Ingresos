<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Conteo - CIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYOShmp1M2Mo-Vc1aN8F-VU0Bw4BXOdLA",
            authDomain: "cic-10-1.firebaseapp.com",
            projectId: "cic-10-1",
            storageBucket: "cic-10-1.firebasestorage.app",
            messagingSenderId: "697412113110",
            appId: "1:697412113110:web:51f5708ed523992d9daf77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const casetas = ["Simón Bolivar", "Carranza", "Edison", "Impulso", "Michelena", "Recepción", "Video Portero U.N."];
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        let selectedCaseta = localStorage.getItem('cic_capture_caseta') || "";
        let configCajones = {};
        let todayData = {};

        const getDayKey = (date) => `${String(date.getDate()).padStart(2, '0')}${String(date.getMonth() + 1).padStart(2, '0')}${date.getFullYear()}`;

        async function init() {
            onSnapshot(doc(db, "CIC", "ConteoIngresos"), (snap) => {
                if (snap.exists()) configCajones = snap.data().configCajones || {};
                renderStats();
            });

            const now = new Date();
            const yearStr = now.getFullYear().toString();
            const monthStr = monthNames[now.getMonth()];
            const dayKey = getDayKey(now);

            onSnapshot(doc(db, "CIC/ConteoIngresos", yearStr, monthStr), (snap) => {
                const fullData = snap.exists() ? snap.data() : {};
                todayData = fullData[dayKey] || {};
                renderStats();
            });
        }

        window.setCaseta = (c) => {
            selectedCaseta = c;
            localStorage.setItem('cic_capture_caseta', c);
            renderStats();
        };

        window.changeCaseta = () => {
            selectedCaseta = "";
            localStorage.removeItem('cic_capture_caseta');
            renderStats();
        };

        async function registrar(path, value = 1) {
            if (!selectedCaseta) return;
            const now = new Date();
            const yearStr = now.getFullYear().toString();
            const monthStr = monthNames[now.getMonth()];
            const dayKey = getDayKey(now);

            const docRef = doc(db, "CIC/ConteoIngresos", yearStr, monthStr);
            
            // Construir objeto de actualización dinámico para manejar anidamiento de externos
            let updateObj = {};
            if (path.includes('.')) {
                const [parent, child] = path.split('.');
                updateObj = {
                    [dayKey]: {
                        [selectedCaseta]: {
                            [parent]: {
                                [child]: increment(value)
                            }
                        }
                    }
                };
            } else {
                updateObj = {
                    [dayKey]: {
                        [selectedCaseta]: {
                            [path]: increment(value)
                        }
                    }
                };
            }

            try {
                await setDoc(docRef, updateObj, { merge: true });
            } catch (e) { console.error("Error al registrar:", e); }
        }

        window.toggleExternosMenu = () => {
            const menu = document.getElementById('externos-bubble');
            menu.classList.toggle('hidden');
        };

        window.registrarExterno = async (tipo) => {
            await registrar(`externos.${tipo}`);
            toggleExternosMenu();
        };

        window.countPersona = () => registrar('personas');
        window.countVehiculo = () => {
            const current = todayData[selectedCaseta]?.vehiculos || 0;
            const lots = configCajones[selectedCaseta] || {};
            const max = Object.values(lots).reduce((a, b) => a + b, 0);
            if (max > 0 && current >= max) {
                // Mensaje visual en lugar de alert molesto si es posible
                console.warn("Estacionamiento lleno.");
            }
            registrar('vehiculos');
        };

        function renderStats() {
            const view = document.getElementById('capture-view');
            const selector = document.getElementById('caseta-selector');
            
            if (!selectedCaseta) {
                view.classList.add('hidden');
                selector.classList.remove('hidden');
            } else {
                selector.classList.add('hidden');
                view.classList.remove('hidden');
                
                const stats = todayData[selectedCaseta] || { personas: 0, vehiculos: 0, externos: {} };
                const lots = configCajones[selectedCaseta] || {};
                const max = Object.values(lots).reduce((a, b) => a + b, 0);
                const disponibles = Math.max(0, max - stats.vehiculos);

                // Cálculo de personas incluyendo externos
                const ext = stats.externos || {};
                const totalPersonas = (stats.personas || 0) + 
                                     ((ext.prestador || 0) + (ext.visita || 0) + (ext.consultor || 0));

                document.getElementById('display-caseta').innerText = selectedCaseta;
                document.getElementById('val-p').innerText = totalPersonas;
                document.getElementById('val-v').innerText = stats.vehiculos;
                document.getElementById('val-disp').innerText = max > 0 ? disponibles : 'N/A';
                
                const dispCont = document.getElementById('container-disp');
                if (max > 0 && disponibles === 0) dispCont.classList.add('bg-rose-600', 'text-white', 'border-rose-400');
                else dispCont.classList.remove('bg-rose-600', 'text-white', 'border-rose-400');
            }
        }

        window.onload = init;
    </script>
    <style>
        .capture-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .capture-btn:active { transform: scale(0.92); filter: brightness(0.9); }
        .bubble-menu { animation: bubbleIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        @keyframes bubbleIn { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .booth-active-badge { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); shadow: 0 4px 15px rgba(30, 58, 138, 0.3); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 font-sans text-slate-800 h-screen flex flex-col overflow-hidden">

    <div id="caseta-selector" class="flex-1 flex flex-col p-6 items-center justify-center text-white overflow-y-auto">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl rotate-3">
                <i class="fa-solid fa-building-shield text-3xl text-white"></i>
            </div>
            <h1 class="text-xl font-black uppercase tracking-[0.2em] mb-2">Puesto de Control</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8">Seleccione su estación de trabajo</p>
            
            <div class="grid grid-cols-1 gap-3">
                <script>
                    document.write(["Simón Bolivar", "Carranza", "Edison", "Impulso", "Michelena", "Recepción", "Video Portero U.N."].map(c => `
                        <button onclick="setCaseta('${c}')" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95">
                            ${c}
                        </button>
                    `).join(''));
                </script>
            </div>
        </div>
    </div>

    <div id="capture-view" class="hidden flex-1 flex flex-col bg-slate-50 rounded-t-[3.5rem] overflow-hidden shadow-2xl relative">
        <header class="p-6 pt-10 flex flex-col items-center gap-4 border-b border-slate-100 bg-white shadow-sm shrink-0">
            <div class="w-full flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 booth-active-badge rounded-xl flex items-center justify-center text-white">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em]">Puesto Activo</p>
                        <h2 id="display-caseta" class="text-lg font-black uppercase text-slate-900 leading-none">---</h2>
                    </div>
                </div>
                <button onclick="changeCaseta()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all active:scale-90 border border-slate-200">
                    Cambiar
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col p-6 gap-6 overflow-y-auto custom-scroll">
            <div class="grid grid-cols-2 gap-4 shrink-0">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[9px] font-black text-indigo-400 uppercase mb-1">Personas Totales</p>
                    <p id="val-p" class="text-4xl font-black text-slate-900 tracking-tighter">0</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[9px] font-black text-emerald-400 uppercase mb-1">Vehículos</p>
                    <p id="val-v" class="text-4xl font-black text-slate-900 tracking-tighter">0</p>
                </div>
            </div>

            <div id="container-disp" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between transition-all shrink-0">
                <div>
                    <h3 class="text-sm font-black uppercase tracking-tight">Cajones Disponibles</h3>
                    <p class="text-[8px] font-bold opacity-60 uppercase">Capacidad total instalada</p>
                </div>
                <span id="val-disp" class="text-4xl font-black tracking-tighter">0</span>
            </div>

            <div class="relative mt-4 shrink-0">
                <div id="externos-bubble" class="hidden absolute bottom-full left-0 right-0 mb-4 bg-white rounded-[2rem] p-4 shadow-2xl border-2 border-indigo-100 bubble-menu z-50">
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="registrarExterno('prestador')" class="py-4 bg-slate-50 hover:bg-indigo-50 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 transition-all border border-slate-100">Prestador de Servicios</button>
                        <button onclick="registrarExterno('visita')" class="py-4 bg-slate-50 hover:bg-indigo-50 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 transition-all border border-slate-100">Visita</button>
                        <button onclick="registrarExterno('consultor')" class="py-4 bg-slate-50 hover:bg-indigo-50 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 transition-all border border-slate-100">Consultor</button>
                    </div>
                </div>
                <button onclick="toggleExternosMenu()" class="capture-btn w-full py-4 bg-white border-2 border-indigo-200 text-indigo-600 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg">
                    <i class="fa-solid fa-users-viewfinder mr-2"></i> Contabilizar Externos
                </button>
            </div>

            <div class="grid grid-cols-1 gap-4 pb-10 mt-auto shrink-0">
                <button onclick="countPersona()" class="capture-btn py-8 bg-indigo-600 text-white rounded-[2.5rem] shadow-xl shadow-indigo-100 flex flex-col items-center gap-2">
                    <i class="fa-solid fa-person-walking text-3xl"></i>
                    <span class="text-xs font-black uppercase tracking-widest">+ Entrada Colaborador</span>
                </button>
                <button onclick="countVehiculo()" class="capture-btn py-8 bg-emerald-500 text-white rounded-[2.5rem] shadow-xl shadow-emerald-100 flex flex-col items-center gap-2">
                    <i class="fa-solid fa-car-side text-3xl"></i>
                    <span class="text-xs font-black uppercase tracking-widest">+ Entrada Vehículo</span>
                </button>
            </div>
        </main>
    </div>

</body>
</html>
