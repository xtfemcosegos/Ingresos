<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesos a corporativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .btn-card {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: visible !important;
        }
        .btn-card:active {
            transform: scale(0.95);
        }
        .bg-light-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210, 100%, 95%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(190, 100%, 95%, 1) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(220, 100%, 92%, 1) 0, transparent 50%);
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            80% { transform: translateY(-40px) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }
        .bubble-plus {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: #2563eb;
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 900;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 0.6s ease-out forwards;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
        }

        /* Animación para el banner de alerta */
        @keyframes pulse-red {
            0%, 100% { background-color: #ef4444; }
            50% { background-color: #b91c1c; }
        }
        .animate-urgent {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="bg-light-mesh text-slate-800 font-sans min-h-screen flex flex-col items-center">
    
    <!-- Banner de Urgencia (Cargado por defecto como oculto) -->
    <div id="offlineBanner" class="hidden w-full animate-urgent text-white py-3 px-4 text-center font-black text-xs uppercase tracking-[0.2em] shadow-lg sticky top-0 z-[100]">
        ⚠️ Sin conexión a internet - Favor de conectarse para sincronizar datos
    </div>

    <div class="w-full max-w-2xl mt-4 sm:mt-10 text-center px-4">
        <!-- Encabezado con Protagonismo de Caseta -->
        <div class="glass-light p-6 rounded-[2.5rem] card-shadow mb-6 flex flex-col items-center justify-center transition-all duration-500">
            <p id="fechaHoy" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mb-3 opacity-80"></p>
            
            <!-- Vista Protagonista -->
            <div id="vistaProtagonista" class="hidden animate-in fade-in zoom-in-95 duration-500 mb-2">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.25em] mb-1">Punto de Control Activo</p>
                <h1 id="nombreCasetaProtagonista" class="text-4xl sm:text-5xl font-black text-slate-900 tracking-tighter leading-tight">---</h1>
            </div>

            <!-- Vista de Selección -->
            <div id="vistaSelector" class="w-full max-w-xs mt-2">
                <div id="tituloGeneral" class="mb-4">
                    <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">
                        Accesos a corporativo
                    </h1>
                </div>
                
                <div class="relative group">
                    <select id="casetaSelect" class="w-full p-3 rounded-2xl bg-white text-slate-800 border border-slate-200 shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all text-sm appearance-none cursor-pointer pr-10 font-bold text-center">
                        <option value="">Cargando puntos...</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400 group-hover:text-blue-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
                
                <button id="btnCambiarCaseta" class="hidden mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-colors">
                    Cambiar punto de control
                </button>
            </div>
        </div>

        <!-- Panel de Botones -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="registrar('Interno')" id="btn-Interno" disabled class="btn-card h-40 sm:h-52 rounded-[2rem] card-shadow bg-white flex flex-col items-center justify-center text-center p-4 disabled:opacity-40">
                <div id="count-interno" class="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm">0</div>
                <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner">🆔</div>
                <span class="text-xl font-black text-blue-900">Interno</span>
                <span class="text-[9px] text-blue-600 uppercase font-extrabold mt-1 tracking-widest">Colaborador</span>
            </button>

            <button onclick="registrar('Externo')" id="btn-Externo" disabled class="btn-card h-40 sm:h-52 rounded-[2rem] card-shadow bg-white flex flex-col items-center justify-center text-center p-4 disabled:opacity-40">
                <div id="count-externo" class="absolute top-4 right-4 bg-indigo-600 text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm">0</div>
                <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner">🏢</div>
                <span class="text-xl font-black text-indigo-900">Externo</span>
                <span class="text-[9px] text-indigo-600 uppercase font-extrabold mt-1 tracking-widest">Socio / Regional</span>
            </button>

            <button onclick="registrar('Visita')" id="btn-Visita" disabled class="btn-card h-40 sm:h-52 rounded-[2rem] card-shadow bg-white flex flex-col items-center justify-center text-center p-4 disabled:opacity-40">
                <div id="count-visita" class="absolute top-4 right-4 bg-emerald-600 text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm">0</div>
                <div class="w-14 h-14 bg-emerald-100 rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner">👋</div>
                <span class="text-xl font-black text-emerald-900">Visita</span>
                <span class="text-[9px] text-emerald-600 uppercase font-extrabold mt-1 tracking-widest">Invitado</span>
            </button>

            <button onclick="registrar('Prestador')" id="btn-Prestador" disabled class="btn-card h-40 sm:h-52 rounded-[2rem] card-shadow bg-white flex flex-col items-center justify-center text-center p-4 disabled:opacity-40">
                <div id="count-prestador" class="absolute top-4 right-4 bg-orange-600 text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm">0</div>
                <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner">🛠️</div>
                <span class="text-xl font-black text-orange-900">Prestador</span>
                <span class="text-[9px] text-orange-600 uppercase font-extrabold mt-1 tracking-widest">Servicios</span>
            </button>
        </div>

        <div class="mt-10 flex flex-col items-center">
            <div id="statusMensaje" class="px-6 py-2 rounded-full bg-white/50 text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] border border-slate-200/50 card-shadow">
                Iniciando...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, increment, onSnapshot, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCWnR9qrcgpHidCXo8kjAnIAM-3Bt0pZQE",
            authDomain: "cic-cco-os.firebaseapp.com",
            databaseURL: "https://cic-cco-os-default-rtdb.firebaseio.com",
            projectId: "cic-cco-os",
            storageBucket: "cic-cco-os.firebasestorage.app",
            messagingSenderId: "707149465913",
            appId: "1:707149465913:web:d84ee1394b1e75473e00e8",
            measurementId: "G-2HCMXLMQXB"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Activar persistencia IndexedDB para funcionar offline
        enableIndexedDbPersistence(db).catch(console.warn);

        const dom = {
            casetaSelect: document.getElementById('casetaSelect'),
            status: document.getElementById('statusMensaje'),
            fecha: document.getElementById('fechaHoy'),
            offlineBanner: document.getElementById('offlineBanner'),
            vistaProtagonista: document.getElementById('vistaProtagonista'),
            nombreProtagonista: document.getElementById('nombreCasetaProtagonista'),
            vistaSelector: document.getElementById('vistaSelector'),
            tituloGeneral: document.getElementById('tituloGeneral'),
            btnCambiar: document.getElementById('btnCambiarCaseta')
        };

        const TIPOS = ['Interno', 'Externo', 'Visita', 'Prestador'];
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        let user = null;
        let unsubscribeLive = null;
        let buffer = { Interno: 0, Externo: 0, Visita: 0, Prestador: 0 };
        let syncTimeout = null;

        // Monitoreo de conexión de red
        const checkConnectivity = () => {
            if (navigator.onLine) {
                dom.offlineBanner.classList.add('hidden');
            } else {
                dom.offlineBanner.classList.remove('hidden');
            }
        };
        window.addEventListener('online', checkConnectivity);
        window.addEventListener('offline', checkConnectivity);
        checkConnectivity();

        const actualizarFecha = () => {
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dom.fecha.innerText = new Date().toLocaleDateString('es-MX', opciones);
        };
        actualizarFecha();

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                cargarCasetas();
            } else {
                signInAnonymously(auth).catch(console.error);
            }
        });

        const cargarCasetas = async () => {
            try {
                const snapshot = await getDoc(doc(db, "CIC", "Casetas"));
                let casetas = snapshot.exists() ? Object.keys(snapshot.data()) : [];

                dom.casetaSelect.innerHTML = '<option value="">-- Selecciona Punto --</option>';
                casetas.sort().forEach(caseta => {
                    const opt = document.createElement('option');
                    opt.value = caseta;
                    opt.textContent = caseta;
                    dom.casetaSelect.appendChild(opt);
                });

                const guardada = localStorage.getItem('caseta_seleccionada_cic');
                if (guardada && casetas.includes(guardada)) {
                    dom.casetaSelect.value = guardada;
                    habilitarSistema(guardada);
                } else {
                    dom.status.innerText = 'Elige un punto de control';
                }
            } catch (err) { 
                console.error(err); 
                dom.status.innerText = 'Error de conexión / Offline';
            }
        };

        const habilitarSistema = (caseta) => {
            TIPOS.forEach(t => document.getElementById(`btn-${t}`).disabled = false);
            
            dom.nombreProtagonista.innerText = caseta;
            dom.vistaProtagonista.classList.remove('hidden');
            dom.tituloGeneral.classList.add('hidden');
            dom.casetaSelect.parentElement.classList.add('hidden');
            dom.btnCambiar.classList.remove('hidden');

            dom.status.innerHTML = `Listo para capturar`;
            escucharTotales(caseta);
        };

        const deshabilitarSistema = () => {
            TIPOS.forEach(t => document.getElementById(`btn-${t}`).disabled = true);
            dom.vistaProtagonista.classList.add('hidden');
            dom.tituloGeneral.classList.remove('hidden');
            dom.casetaSelect.parentElement.classList.remove('hidden');
            dom.btnCambiar.classList.add('hidden');
            dom.status.innerText = 'Selecciona punto de control';
            if (unsubscribeLive) unsubscribeLive();
        };

        const escucharTotales = (caseta) => {
            if (unsubscribeLive) unsubscribeLive();
            const ahora = new Date();
            const anio = ahora.getFullYear().toString();
            const mesNombre = meses[ahora.getMonth()];
            const dateKey = ahora.toLocaleDateString('en-CA', {timeZone: 'America/Monterrey'}); 

            unsubscribeLive = onSnapshot(doc(db, "CIC", "Ingreso-Colaboradores", anio, mesNombre), (snap) => {
                if (snap.exists() && snap.data()[dateKey] && snap.data()[dateKey][caseta]) {
                    const data = snap.data()[dateKey][caseta];
                    TIPOS.forEach(t => {
                        const label = document.getElementById(`count-${t.toLowerCase()}`);
                        if (label) label.innerText = data[t.toLowerCase()] || 0;
                    });
                } else {
                    limpiarContadores();
                }
            });
        };

        const limpiarContadores = () => {
            TIPOS.forEach(t => {
                const label = document.getElementById(`count-${t.toLowerCase()}`);
                if (label) label.innerText = "0";
            });
        };

        dom.casetaSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                localStorage.setItem('caseta_seleccionada_cic', val);
                habilitarSistema(val);
            } else {
                localStorage.removeItem('caseta_seleccionada_cic');
                deshabilitarSistema();
            }
        });

        dom.btnCambiar.addEventListener('click', () => {
            dom.tituloGeneral.classList.remove('hidden');
            dom.casetaSelect.parentElement.classList.remove('hidden');
            dom.btnCambiar.classList.add('hidden');
            dom.casetaSelect.focus();
        });

        window.registrar = (tipo) => {
            const caseta = dom.casetaSelect.value;
            if (!caseta || !user) return;

            buffer[tipo]++;
            const btn = document.getElementById(`btn-${tipo}`);
            const bubble = document.createElement('div');
            bubble.className = 'bubble-plus';
            bubble.innerText = `+${buffer[tipo]}`;
            btn.appendChild(bubble);
            setTimeout(() => bubble.remove(), 600);

            if (syncTimeout) clearTimeout(syncTimeout);
            dom.status.innerHTML = `<span class="text-blue-600 font-bold animate-pulse tracking-widest uppercase text-[9px]">${navigator.onLine ? 'Sincronizando...' : 'Guardando localmente...'}</span>`;
            
            syncTimeout = setTimeout(() => sincronizarConDB(caseta), 600);
        };

        const sincronizarConDB = async (caseta) => {
            const dataToSync = { ...buffer };
            buffer = { Interno: 0, Externo: 0, Visita: 0, Prestador: 0 };
            const ahora = new Date();
            const anio = ahora.getFullYear().toString();
            const mesNombre = meses[ahora.getMonth()];
            const dateKey = ahora.toLocaleDateString('en-CA', {timeZone: 'America/Monterrey'}); 

            try {
                const docRef = doc(db, "CIC", "Ingreso-Colaboradores", anio, mesNombre);
                let totalBuffered = 0;
                const updateObj = { [dateKey]: { [caseta]: {} } };

                Object.keys(dataToSync).forEach(tipo => {
                    if (dataToSync[tipo] > 0) {
                        const val = dataToSync[tipo];
                        updateObj[dateKey][caseta][tipo.toLowerCase()] = increment(val);
                        totalBuffered += val;
                    }
                });

                if (totalBuffered === 0) return;
                updateObj[dateKey][caseta].total = increment(totalBuffered);
                updateObj[dateKey].totalDia = increment(totalBuffered);

                await setDoc(docRef, updateObj, { merge: true });
                dom.status.innerHTML = `<span class="text-emerald-600 font-black tracking-widest uppercase">✓ OK</span>`;
                setTimeout(() => {
                    if (dom.casetaSelect.value) dom.status.innerHTML = `Listo para capturar`;
                }, 1000);
            } catch (error) {
                console.error(error);
                dom.status.innerHTML = `<span class="text-red-500 font-bold uppercase text-[9px]">Reintentando automáticamente...</span>`;
            }
        };
    </script>
</body>
</html>
